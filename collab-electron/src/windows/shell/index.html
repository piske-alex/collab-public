<!doctype html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Collaborator</title>
	<link rel="stylesheet" href="./src/shell.css" />
</head>

<body>
	<div id="titlebar"></div>
	<span id="alpha-label">COLLABORATOR ALPHA &#x2022; BEWARE BUGS <a
			href="https://github.com/collaborator-ai/collab-public/issues/new" target="_blank">[<span>CREATE ISSUE</span>]</a></span>

	<button type="button" id="nav-toggle" class="panel-toggle" aria-pressed="true" aria-label="Hide Navigator"
		title="Hide Navigator"></button>
	<button type="button" id="terminal-toggle" class="panel-toggle panel-toggle-right" aria-pressed="true" aria-label="Hide Terminals"
		title="Hide Terminals"></button>

	<div id="panels">
		<div id="panel-nav">
			<div id="nav-toolbar">
				<button type="button" id="settings-btn" aria-label="Settings" title="Settings">
					<svg width="15" height="15" viewBox="0 0 256 256" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
						<path d="M128,80a48,48,0,1,0,48,48A48.05,48.05,0,0,0,128,80Zm0,80a32,32,0,1,1,32-32A32,32,0,0,1,128,160Zm109.94-52.79a8,8,0,0,0-3.89-5.4l-29.83-17-.12-33.62a8,8,0,0,0-2.83-6.08,111.91,111.91,0,0,0-36.72-20.67,8,8,0,0,0-6.46.59L128,41.85,97.88,25a8,8,0,0,0-6.47-.6A112.1,112.1,0,0,0,54.73,45.15a8,8,0,0,0-2.83,6.07l-.15,33.65-29.83,17a8,8,0,0,0-3.89,5.4,106.47,106.47,0,0,0,0,41.56,8,8,0,0,0,3.89,5.4l29.83,17,.12,33.62a8,8,0,0,0,2.83,6.08,111.91,111.91,0,0,0,36.72,20.67,8,8,0,0,0,6.46-.59L128,214.15,158.12,231a7.91,7.91,0,0,0,3.9,1,8.09,8.09,0,0,0,2.57-.42,112.1,112.1,0,0,0,36.68-20.73,8,8,0,0,0,2.83-6.07l.15-33.65,29.83-17a8,8,0,0,0,3.89-5.4A106.47,106.47,0,0,0,237.94,107.21Zm-15,34.91-28.57,16.25a8,8,0,0,0-3,3c-.58,1-1.19,2.06-1.81,3.06a7.94,7.94,0,0,0-1.22,4.21l-.15,32.25a95.89,95.89,0,0,1-25.37,14.3L134,199.13a8,8,0,0,0-3.91-1h-.19c-1.21,0-2.43,0-3.64,0a8.08,8.08,0,0,0-4.1,1l-28.84,16.1A96,96,0,0,1,67.88,201l-.11-32.2a8,8,0,0,0-1.22-4.22c-.62-1-1.23-2-1.8-3.06a8.09,8.09,0,0,0-3-3.06l-28.6-16.29a90.49,90.49,0,0,1,0-28.26L61.67,97.63a8,8,0,0,0,3-3c.58-1,1.19-2.06,1.81-3.06a7.94,7.94,0,0,0,1.22-4.21l.15-32.25a95.89,95.89,0,0,1,25.37-14.3L122,56.87a8,8,0,0,0,4.1,1c1.21,0,2.43,0,3.64,0a8.08,8.08,0,0,0,4.1-1l28.84-16.1A96,96,0,0,1,188.12,55l.11,32.2a8,8,0,0,0,1.22,4.22c.62,1,1.23,2,1.8,3.06a8.09,8.09,0,0,0,3,3.06l28.6,16.29A90.49,90.49,0,0,1,222.9,142.12Z"/>
					</svg>
				</button>
				<button type="button" id="update-pill" style="display: none;"></button>
				<div id="workspace-dropdown-row">
					<div id="workspace-dropdown">
						<button type="button" id="workspace-trigger">
							<span id="workspace-trigger-label"><span id="workspace-trigger-parent"></span><span
									id="workspace-trigger-name">No workspace</span></span>
							<svg class="dropdown-caret" width="12" height="12" viewBox="0 0 24 24" fill="none"
								stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
								<polyline points="6 9 12 15 18 9" />
							</svg>
						</button>
						<div id="workspace-menu" class="hidden">
							<div id="workspace-menu-items"></div>
							<button type="button" class="dropdown-item dropdown-item-add" id="ws-add-option">
								+ Add workspace&#x2026;
							</button>
						</div>
					</div>
				</div>
			</div>
		</div>
		<div id="nav-resize" class="resize-handle" data-panel="nav"></div>
		<div id="panel-viewer">
			<canvas id="grid-canvas"></canvas>
			<div id="tile-layer"></div>
			<div id="edge-indicators"></div>
			<div id="zoom-indicator">100%</div>
		</div>
		<div id="terminal-resize" class="resize-handle" data-panel="terminal"></div>
		<div id="panel-terminal"></div>
	</div>

	<div id="settings-overlay">
		<div id="settings-backdrop"></div>
		<div id="settings-modal"></div>
	</div>

	<div id="canvas-skill-dialog" class="hidden">
		<div id="canvas-skill-backdrop"></div>
		<div id="canvas-skill-modal">
			<h2>Canvas Skill for AI Agents</h2>
			<p>Collaborator can install a canvas skill for your AI coding agents, letting them arrange tiles on your workspace.</p>
			<div id="canvas-skill-agents"></div>
			<div id="canvas-skill-actions">
				<button type="button" id="canvas-skill-skip">Skip</button>
				<button type="button" id="canvas-skill-install">Install</button>
			</div>
		</div>
	</div>

	<div id="resize-overlay"></div>

	<div id="loading-overlay">
		<div id="loading-spinner"></div>
		<div id="loading-status">Initializing&#x2026;</div>
	</div>

	<script type="module" src="./src/renderer.js"></script>
</body>

</html>
